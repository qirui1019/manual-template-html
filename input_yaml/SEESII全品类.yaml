SEESII说明书页面结构:
  - 页面名称: "封面"
    页面类型: "封面页"
    页面顺序: 1
    页面说明: "SEESII HKF50 无绳钉枪说明书封面页面"

    包含模块:
      - 模块名称: "封面背景装饰模块"
        模块类型: "背景装饰模块"
        模块说明: "用于描述封面中的灰底区域、斜切背景块、箭头纹理等非内容型视觉装饰"
        包含元素:
          - 元素名称: "顶部灰底斜切背景"
            元素类型: "背景色块"
            元素用途: "承载封面顶部品牌、标题和重要提示区域的视觉背景"

          - 元素名称: "底部灰底信息条"
            元素类型: "背景色块"
            元素用途: "承载型号和售后邮箱等底部辅助信息"

          - 元素名称: "左下角箭头纹理"
            元素类型: "装饰图形"
            元素用途: "增强封面视觉层次和品牌风格"

      - 模块名称: "封面主视觉模块"
        模块类型: "主视觉模块"
        模块说明: "用于承载品牌、产品、说明书名称、产品主图和型号等封面核心信息"
        包含元素:
          - 元素名称: "品牌logo"
            元素类型: "图片"
            元素用途: "展示品牌logo"

          - 元素名称: "一级标题"
            元素类型: "文本框"
            元素用途: "展示说明书主标题或产品名称"

          - 元素名称: "二级标题"
            元素类型: "文本框"
            元素用途: "展示说明书类型或副标题"

          - 元素名称: "产品主图"
            元素类型: "图片占位符"
            元素用途: "展示产品主图或预留产品图片位置"

      - 模块名称: "封面辅助信息模块"
        模块类型: "信息模块"
        模块说明: "用于承载封面上的型号、重要提示、售后邮箱等辅助信息"
        包含元素:
          - 元素名称: "产品型号"
            元素类型: "文本框"
            元素用途: "展示产品型号"

          - 元素名称: "产品描述"
            元素类型: "文本框"
            元素用途: "展示产品规格或产品补充描述"

          - 元素名称: "重要提示"
            元素类型: "文本框"
            元素用途: "展示封面安全阅读提示"

          - 元素名称: "售后邮箱"
            元素类型: "文本框"
            元素用途: "展示售后联系方式"

  - 页面名称: "目录"
    页面类型: "目录页"
    页面顺序: 2
    页面说明: "用于展示说明书章节目录、子章节标题及对应页码，帮助用户快速定位内容"

    包含模块:
      - 模块名称: "页眉品牌信息模块"
        模块类型: "页眉模块"
        模块说明: "用于承载页面顶部的品牌标识、售后邮箱和右侧箭头装饰"
        包含元素:
          - 元素名称: "品牌logo"
            元素类型: "图片"
            元素用途: "展示品牌logo"

          - 元素名称: "页眉售后邮箱"
            元素类型: "文本框"
            元素用途: "展示售后联系方式"

          - 元素名称: "右上角箭头装饰"
            元素类型: "装饰图形"
            元素用途: "增强页眉视觉识别和品牌风格"

          - 元素名称: "页眉灰底信息条"
            元素类型: "背景色块"
            元素用途: "承载页眉品牌、邮箱及装饰元素"

      - 模块名称: "目录标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示目录页主标题"
        包含元素:
          - 元素名称: "目录标题"
            元素类型: "文本框"
            元素用途: "展示目录页标题"

      - 模块名称: "目录列表模块"
        模块类型: "目录模块"
        模块说明: "用于展示一级章节、二级章节和对应页码"
        包含元素:
          - 元素名称: "一级目录项"
            元素类型: "目录文本"
            元素用途: "展示主要章节标题"

          - 元素名称: "二级目录项"
            元素类型: "目录文本"
            元素用途: "展示主要章节下的子章节标题"

          - 元素名称: "目录引导线"
            元素类型: "装饰线"
            元素用途: "连接目录标题与页码，提升阅读定位效率"

          - 元素名称: "目录页码"
            元素类型: "页码文本"
            元素用途: "展示章节对应页码"

      - 模块名称: "页面背景装饰模块"
        模块类型: "背景装饰模块"
        模块说明: "用于描述目录页中的浅灰背景区域和页面底部斜切装饰"
        包含元素:
          - 元素名称: "目录页浅灰背景"
            元素类型: "背景色块"
            元素用途: "形成目录内容区域的视觉底色"

          - 元素名称: "右下角斜切装饰"
            元素类型: "装饰图形"
            元素用途: "延续说明书整体视觉风格"

  - 页面名称: "安全警告"
    页面类型: "安全警告页"
    页面顺序: 3
    页面说明: "用于承载产品安全警告相关内容，包括章节标题、小节标题、警告提示和正文说明"

    包含模块:
      - 模块名称: "安全警告标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示安全警告章节的主标题"
        包含元素:
          - 元素名称: "一级标题"
            元素类型: "标题文本"
            元素用途: "展示章节主标题"

      - 模块名称: "安全警告提示模块"
        模块类型: "警告提示模块"
        模块说明: "用于展示安全警告类的重点提示信息"
        包含元素:
          - 元素名称: "警告图标"
            元素类型: "图标"
            元素用途: "提示安全风险或警告信息"

          - 元素名称: "警告标题"
            元素类型: "标题文本"
            元素用途: "展示警告提示标题"

          - 元素名称: "警告文本框"
            元素类型: "文本框"
            元素用途: "展示警告说明文字"

      - 模块名称: "安全警告正文模块"
        模块类型: "正文模块"
        模块说明: "用于展示安全警告章节下的各级说明内容"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示安全警告下的分组标题"

          - 元素名称: "三级标题"
            元素类型: "标题文本"
            元素用途: "展示更细分的安全说明标题"

          - 元素名称: "文本框"
            元素类型: "文本框"
            元素用途: "展示安全说明正文"

          - 元素名称: "列表文本"
            元素类型: "列表文本"
            元素用途: "展示条目化安全说明"

      - 模块名称: "页面辅助视觉模块"
        模块类型: "视觉辅助模块"
        模块说明: "用于承载安全警告页面中的辅助视觉元素"
        包含元素:
          - 元素名称: "分隔线"
            元素类型: "装饰线"
            元素用途: "区分不同内容区域"

          - 元素名称: "强调色块"
            元素类型: "背景色块"
            元素用途: "突出重要提示或警告区域"

          - 元素名称: "页码"
            元素类型: "页码文本"
            元素用途: "展示页面编号"

  - 页面名称: "功能说明与规格参数"
    页面类型: "功能规格页"
    页面顺序: 4
    页面说明: "用于承载产品功能结构说明、规格参数、配件规格及相关图示信息"

    包含模块:
      - 模块名称: "功能规格标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示功能说明与规格参数章节的主标题"
        包含元素:
          - 元素名称: "一级标题"
            元素类型: "标题文本"
            元素用途: "展示章节主标题"

      - 模块名称: "产品规格参数模块"
        模块类型: "参数模块"
        模块说明: "用于展示产品型号、性能、电源、尺寸、重量等规格参数"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示规格参数分组标题"

          - 元素名称: "参数表格"
            元素类型: "表格"
            元素用途: "展示参数名称与参数值"

          - 元素名称: "参数名称"
            元素类型: "表格文本"
            元素用途: "展示规格参数字段名称"

          - 元素名称: "参数值"
            元素类型: "表格文本"
            元素用途: "展示规格参数对应数值或说明"

      - 模块名称: "产品结构示意模块"
        模块类型: "图示说明模块"
        模块说明: "用于展示产品结构图、部件标注及功能位置说明"
        包含元素:
          - 元素名称: "产品示意图"
            元素类型: "图片"
            元素用途: "展示产品外观或结构示意"

          - 元素名称: "部件标注"
            元素类型: "标注文本"
            元素用途: "标注产品关键部件名称"

          - 元素名称: "指示线"
            元素类型: "装饰线"
            元素用途: "连接部件标注与产品示意图对应位置"

      - 模块名称: "配件规格说明模块"
        模块类型: "配件说明模块"
        模块说明: "用于展示电池、充电器、耗材或其他配件相关规格说明"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示配件规格分组标题"

          - 元素名称: "三级标题"
            元素类型: "标题文本"
            元素用途: "展示具体配件说明标题"

          - 元素名称: "文本框"
            元素类型: "文本框"
            元素用途: "展示配件功能、使用方式或注意事项说明"

          - 元素名称: "配件图片"
            元素类型: "图片"
            元素用途: "展示配件外观或安装示意"

          - 元素名称: "步骤图"
            元素类型: "图片"
            元素用途: "展示配件安装、拆卸或连接过程"

      - 模块名称: "页面辅助视觉模块"
        模块类型: "视觉辅助模块"
        模块说明: "用于承载功能规格页面中的辅助视觉元素"
        包含元素:
          - 元素名称: "分隔线"
            元素类型: "装饰线"
            元素用途: "区分不同内容区域"

          - 元素名称: "背景色块"
            元素类型: "背景色块"
            元素用途: "突出参数表格、图示说明或配件说明区域"

          - 元素名称: "页码"
            元素类型: "页码文本"
            元素用途: "展示页面编号"

  - 页面名称: "操作指南"
    页面类型: "操作说明页"
    页面顺序: 5
    页面说明: "用于承载产品使用前检查、操作模式选择、使用步骤、调节方式及相关图示说明"

    包含模块:
      - 模块名称: "操作指南标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示操作指南章节的主标题"
        包含元素:
          - 元素名称: "一级标题"
            元素类型: "标题文本"
            元素用途: "展示章节主标题"

      - 模块名称: "操作前检查模块"
        模块类型: "检查说明模块"
        模块说明: "用于展示产品使用前需要确认的检查事项"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示操作前检查分组标题"

          - 元素名称: "文本框"
            元素类型: "文本框"
            元素用途: "展示检查说明正文"

          - 元素名称: "列表文本"
            元素类型: "列表文本"
            元素用途: "展示条目化检查事项"

      - 模块名称: "安装图示模块"
        模块类型: "步骤图示模块"
        模块说明: "用于展示耗材安装、部件安装或准备操作的图示流程"
        包含元素:
          - 元素名称: "步骤图"
            元素类型: "图片"
            元素用途: "展示安装或准备过程的步骤图片"

          - 元素名称: "步骤编号"
            元素类型: "编号文本"
            元素用途: "标识步骤顺序"

          - 元素名称: "步骤说明"
            元素类型: "文本框"
            元素用途: "说明每一步操作内容"

      - 模块名称: "操作模式说明模块"
        模块类型: "模式说明模块"
        模块说明: "用于展示产品不同操作模式及其适用场景"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示操作模式分组标题"

          - 元素名称: "模式名称"
            元素类型: "标题文本"
            元素用途: "展示不同操作模式名称"

          - 元素名称: "模式说明文本"
            元素类型: "文本框"
            元素用途: "展示模式功能、适用场景或使用说明"

          - 元素名称: "模式图示"
            元素类型: "图片"
            元素用途: "展示模式切换或操作位置示意"

      - 模块名称: "操作步骤模块"
        模块类型: "步骤说明模块"
        模块说明: "用于展示产品正式使用过程中的步骤化操作说明"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示操作步骤分组标题"

          - 元素名称: "三级标题"
            元素类型: "标题文本"
            元素用途: "展示具体操作方式或子流程标题"

          - 元素名称: "步骤文本"
            元素类型: "步骤文本"
            元素用途: "展示按顺序排列的操作步骤"

          - 元素名称: "步骤图"
            元素类型: "图片"
            元素用途: "展示具体操作动作或流程示意"

      - 模块名称: "调节说明模块"
        模块类型: "调节说明模块"
        模块说明: "用于展示产品深度、档位、力度或其他可调功能的说明"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示调节说明分组标题"

          - 元素名称: "调节说明文本"
            元素类型: "文本框"
            元素用途: "展示调节方式、方向、效果或注意事项"

          - 元素名称: "调节图示"
            元素类型: "图片"
            元素用途: "展示调节旋钮、按键或调节位置"

      - 模块名称: "页面辅助视觉模块"
        模块类型: "视觉辅助模块"
        模块说明: "用于承载操作指南页面中的辅助视觉元素"
        包含元素:
          - 元素名称: "分隔线"
            元素类型: "装饰线"
            元素用途: "区分不同操作区域"

          - 元素名称: "背景色块"
            元素类型: "背景色块"
            元素用途: "突出步骤、提示或图示区域"

          - 元素名称: "页码"
            元素类型: "页码文本"
            元素用途: "展示页面编号"

  - 页面名称: "维护保养"
    页面类型: "维护说明页"
    页面顺序: 6
    页面说明: "用于承载产品检查、清洁、存放及维护注意事项等维护类内容"

    包含模块:
      - 模块名称: "维护保养标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示维护保养章节的主标题"
        包含元素:
          - 元素名称: "一级标题"
            元素类型: "标题文本"
            元素用途: "展示章节主标题"

      - 模块名称: "维护内容说明模块"
        模块类型: "正文说明模块"
        模块说明: "用于展示维护保养章节中的各类说明内容，如检查、清洁、存放、注意事项等"
        包含元素:
          - 元素名称: "二级标题"
            元素类型: "标题文本"
            元素用途: "展示维护内容分组标题"

          - 元素名称: "三级标题"
            元素类型: "标题文本"
            元素用途: "展示更细分的维护项目标题"

          - 元素名称: "文本框"
            元素类型: "文本框"
            元素用途: "展示维护说明正文"

          - 元素名称: "列表文本"
            元素类型: "列表文本"
            元素用途: "展示条目化维护要求或操作说明"

      - 模块名称: "页面辅助视觉模块"
        模块类型: "视觉辅助模块"
        模块说明: "用于承载维护保养页面中的辅助视觉元素"
        包含元素:
          - 元素名称: "分隔线"
            元素类型: "装饰线"
            元素用途: "区分不同内容区域"

          - 元素名称: "背景色块"
            元素类型: "背景色块"
            元素用途: "突出重点说明或提示区域"

          - 元素名称: "页码"
            元素类型: "页码文本"
            元素用途: "展示页面编号"

  - 页面名称: "故障排除"
    页面类型: "故障排查页"
    页面顺序: 7
    页面说明: "用于承载产品常见故障、排查说明、处理方法及相关提示内容"

    包含模块:
      - 模块名称: "故障排除标题模块"
        模块类型: "标题模块"
        模块说明: "用于展示故障排除章节的主标题"
        包含元素:
          - 元素名称: "一级标题"
            元素类型: "标题文本"
            元素用途: "展示章节主标题"

      - 模块名称: "故障排查内容模块"
